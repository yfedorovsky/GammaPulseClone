<text x="306" y="498" fill="#F4C430" font-family="Arial, sans-serif" font-size="25" font-weight="bold" text-anchor="end">fired ~noon</text>
<text x="306" y="528" fill="#8B949E" font-family="Arial, sans-serif" font-size="22" text-anchor="end">+3.6% still ahead</text>
