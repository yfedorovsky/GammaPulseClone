<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" width="800" height="1000">
<rect x="0" y="0" width="800" height="1000" fill="#0B0F17"/>
<rect x="0" y="0" width="800" height="8" fill="#26D07C"/>
<text x="60" y="100" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="44" font-weight="bold">What actually worked</text>
<text x="60" y="150" fill="#8B949E" font-family="Arial, sans-serif" font-size="26">A name pulling away from its sector —</text>
<text x="60" y="186" fill="#8B949E" font-family="Arial, sans-serif" font-size="26">in real time. We call it RS-decouple.</text>
<text x="60" y="300" fill="#6E7681" font-family="Arial, sans-serif" font-size="22">GLW lead over its sector (%)</text>
<path d="M90,633 L168,676 L272,586 L324,529 L428,421 L532,363 L636,324 L740,356 L740,700 L90,700 Z" fill="#26D07C" opacity="0.12"/>
