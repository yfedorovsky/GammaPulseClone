<text x="636" y="304" fill="#26D07C" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle">peak +9.9%</text>
<line x1="318" y1="512" x2="324" y2="529" stroke="#F4C430" stroke-width="2"/>
