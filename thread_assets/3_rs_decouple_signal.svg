<text x="60" y="846" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="30" font-weight="bold">4 of 467 names fired that day</text>
<text x="60" y="884" fill="#8B949E" font-family="Arial, sans-serif" font-size="23">GLW · SMCI · KLAC · SOFI — all real leaders.</text>
<text x="60" y="936" fill="#26D07C" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Signal because it's rare. Not 1 of 600 alerts.</text>
