<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" width="800" height="1000">
<rect x="0" y="0" width="800" height="1000" fill="#0B0F17"/>
<rect x="0" y="0" width="800" height="8" fill="#26D07C"/>
<text x="60" y="110" fill="#E6EDF3" font-family="Arial, sans-serif" font-size="46" font-weight="bold">The "optics bottomed" trap</text>
<text x="60" y="160" fill="#8B949E" font-family="Arial, sans-serif" font-size="26">June 18 — everyone called a sector bottom.</text>
<text x="60" y="196" fill="#8B949E" font-family="Arial, sans-serif" font-size="26">One name went up. The rest got crushed.</text>
<line x1="430" y1="270" x2="430" y2="800" stroke="#30363D" stroke-width="2"/>
